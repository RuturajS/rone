version: '3.8'

services:
  rone:
    build: .
    container_name: rone
    restart: always
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    environment:
      - RONE_LOG_LEVEL=info
      # These can be set here or in a .env file
      # - RONE_TELEGRAM_TOKEN=${RONE_TELEGRAM_TOKEN}
      # - RONE_TELEGRAM_CHAT_ID=${RONE_TELEGRAM_CHAT_ID}
      # - RONE_OLLAMA_ENDPOINT=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
